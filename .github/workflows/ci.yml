name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Lint
        run: |
          uvx ruff check .
          uvx ruff format --check .

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run --extra dev pytest -q

      - name: Test feedforward-practice package
        working-directory: practice
        run: uv run --extra serve --extra dev python -m pytest tests -q
