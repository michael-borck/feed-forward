# FeedForward VPS deployment — pulls the prebuilt image from GHCR.
# Images are published by the Release workflow when a v* tag is pushed.
#
# On the VPS you only need this file and a .env:
#   mkdir -p /opt/feedforward && cd /opt/feedforward
#   curl -fLO https://raw.githubusercontent.com/michael-borck/feed-forward/main/deploy/docker-compose.yml
#   nano .env    # SECRET_KEY, APP_DOMAIN, ADMIN_*, AI provider API keys
#   docker compose up -d
#
# Update to the latest release:
#   docker compose pull && docker compose up -d
#
# Pin a specific version by setting FEEDFORWARD_VERSION=0.2.0 in .env.
#
# The app listens on 127.0.0.1:5001 — put your own reverse proxy (nginx,
# Caddy, Traefik, ...) in front for HTTPS. Sample configs live in this
# directory. To expose it directly instead, change the port mapping to
# "5001:5001".

services:
  feedforward:
    image: ghcr.io/michael-borck/feed-forward:${FEEDFORWARD_VERSION:-latest}
    container_name: feedforward-app
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - feedforward-data:/app/data
      - feedforward-logs:/app/logs
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      - FEEDFORWARD_ENV=production
      - APP_DOMAIN=${APP_DOMAIN:-http://localhost:5001}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Optional: Ollama for local LLM (docker compose --profile with-ollama up -d)
  ollama:
    image: ollama/ollama:latest
    container_name: feedforward-ollama
    profiles: ["with-ollama"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "ollama serve &
      sleep 5 &&
      ollama pull llama3.2 &&
      tail -f /dev/null"

volumes:
  feedforward-data:
    driver: local
  feedforward-logs:
    driver: local
  ollama-data:
    driver: local
